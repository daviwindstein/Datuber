<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Datuber</title>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: sans-serif; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #0f0f0f; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 20px; }
        
        /* Shorts Page (Vertical Scroll) */
        .shorts-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .short-item { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; border-bottom: 1px solid #333; }
        
        /* Video Player */
        .video-player { width: 80%; margin: 20px auto; }
        .actions { display: flex; gap: 20px; margin: 10px 0; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div onclick="showPage('home')">📺 <b>Datuber</b></div>
    <div class="nav-right">
        <span class="icon-btn" onclick="showPage('home')">🏠</span>
        <span class="icon-btn" onclick="showPage('shorts')">🎬</span>
        <span class="icon-btn" onclick="showPage('live')">🔴</span>
        <span class="icon-btn" onclick="showPage('create')">➕</span>
        <img src="https://ui-avatars.com/api/?name=User" style="width:30px; border-radius:50%" onclick="toggleProfile()">
    </div>
</header>

<div id="homePage">
    <h2>Vídeos Recomendados</h2>
    <div onclick="openVideo('Meu Primeiro Vídeo')">🎥 Clique para ver este vídeo</div>
</div>

<div id="shortsPage" class="hidden shorts-container">
    <div class="short-item"><h1>Shorts 1 (Arraste para cima)</h1></div>
    <div class="short-item"><h1>Shorts 2</h1></div>
</div>

<div id="videoPage" class="hidden video-player">
    <h2 id="vidTitle">Título do Vídeo</h2>
    <div style="width:100%; height:400px; background:#333;">PLAYER DE VÍDEO</div>
    <div class="actions">
        <button onclick="alert('Like!')">👍 Like</button>
        <button onclick="alert('Inscrito!')">🔔 Inscrever-se</button>
        <button onclick="alert('Compartilhado!')">🔗 Compartilhar</button>
    </div>
    <textarea placeholder="Comente algo..."></textarea>
</div>

<script>
    function showPage(page) {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('shortsPage').classList.add('hidden');
        document.getElementById('videoPage').classList.add('hidden');
        
        if(page === 'home') document.getElementById('homePage').classList.remove('hidden');
        if(page === 'shorts') document.getElementById('shortsPage').classList.remove('hidden');
    }

    function openVideo(title) {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('videoPage').classList.remove('hidden');
        document.getElementById('vidTitle').innerText = title;
    }
</script>
</body>
</html>
