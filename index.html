<html lang="pt-br">

    <title>Datuber - Seu novo YouTube</title>
    <style>
        /* CSS - O VISUAL DO SITE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f9f9f9; display: flex; flex-direction: column; height: 100vh; }

        /* Barra Superior */
        .navbar { 
            position: fixed; top: 0; width: 100%; height: 65px; 
            background: white; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; 
            border-bottom: 1px solid #e5e5e5; z-index: 1000;
        }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 15px; }
        .nav-center { flex-grow: 1; display: flex; justify-content: center; }
        
        .site-name { font-size: 22px; font-weight: bold; color: #ff0000; margin-left: 10px; }
        .search-bar { width: 100%; max-width: 500px; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .search-bar:focus { border-color: #065fd4; }

        .profile-img { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; background: #ddd; object-fit: cover; }
        .btn-criar { background: #f2f2f2; border: none; padding: 8px 15px; border-radius: 18px; cursor: pointer; font-weight: 500; }
        .btn-criar:hover { background: #e5e5e5; }
        .btn-install { background: #065fd4; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; }

        /* Sidebar Lateral */
        .sidebar { 
            width: 220px; background: white; height: calc(100vh - 65px); 
            position: fixed; top: 65px; padding: 10px; border-right: 1px solid #e5e5e5;
        }
        .sidebar a { display: block; padding: 12px 15px; text-decoration: none; color: #0f0f0f; border-radius: 10px; margin-bottom: 5px; }
        .sidebar a:hover { background: #f2f2f2; }

        /* Dropdowns (Menus que aparecem ao clicar) */
        .dropdown { 
            display: none; position: absolute; top: 60px; 
            background: white; border-radius: 12px; width: 220px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); padding: 10px 0; z-index: 2000;
        }
        .dropdown a { display: block; padding: 12px 20px; text-decoration: none; color: #0f0f0f; font-size: 14px; }
        .dropdown a:hover { background: #f2f2f2; }
