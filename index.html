<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Datuber - Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        /* ESTILO IGUAL À SUA FOTO */
        body { margin: 0; background: #0f0f0f; color: white; font-family: sans-serif; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background: #0f0f0f; border-bottom: 1px solid #333;
            position: fixed; width: 100%; top: 0; z-index: 1000;
        }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        .icon { cursor: pointer; font-size: 20px; padding: 5px; }
        .profile-pic { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; object-fit: cover; background: #333; }

        /* MENU DROPDOWN DIREITO */
        .dropdown {
            display: none; position: fixed; top: 60px; right: 10px; 
            background: #1f1f1f; width: 200px; border-radius: 8px; z-index: 2000;
        }
        .dropdown a { display: block; color: white; padding: 12px 20px; text-decoration: none; cursor: pointer; }
        .dropdown a:hover { background: #333; }

        /* PÁGINAS */
        .page { display: none; padding: 80px 20px; min-height: 100vh; }
        .active { display: block; }
        
        .video-card { margin-bottom: 20px; background: #1a1a1a; padding: 10px; border-radius: 10px; }
        video { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <div onclick="location.reload()" style="cursor:pointer">📺 <b>Datuber</b></div>
        <div class="nav-right">
            <span class="icon" onclick="showPage('home')">🏠</span>
            <span class="icon" onclick="showPage('shorts')">🎬</span>
            <span class="icon" onclick="showPage('lives')" style="color:red">🔴</span>
            <span class="icon" onclick="toggleMenu('menuCriar')">➕</span>
            <img src="https://via.placeholder.com/35" id="userImg" class="profile-pic" onclick="toggleMenu('menuUser')">
        </div>
    </header>

    <div id="menuCriar" class="dropdown">
        <a onclick="inputVideo.click()">Postar Vídeo</a>
        <a onclick="alert('Iniciando Live...')">Iniciar Live</a>
        <a onclick="inputShort.click()">Postar Short</a>
    </div>

    <div id="menuUser" class="dropdown">
        <a onclick="showPage('canal')">Meu Canal</a>
        <a onclick="alert('Studio Aberto')">Studio</a>
        <a onclick="loginGoogle()">Login com Google</a>
        <a onclick="inputFoto.click()">Mudar Foto do Canal</a>
        <a onclick="alert('Saindo...')">Sair</a>
    </div>

    <input type="file" id="inputVideo" hidden accept="video/*" onchange="uploadMidia(this, 'videos')">
    <input type="file" id="inputShort" hidden accept="video/*" onchange="uploadMidia(this, 'shorts')">
    <input type="file" id="inputFoto" hidden accept="image/*" onchange="updateFoto(this)">

    <div id="home" class="page active">
        <h3>Página Inicial</h3>
        <div id="feedVideos">Carregando vídeos...</div>
    </div>

    <div id="shorts" class="page">
        <h3>Shorts</h3>
        <div id="feedShorts"></div>
    </div>

    <script>
        // --- COLE AQUI A SUA CONFIGURACAO DO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBE9l22xIL6QB7ASJ80U_UTl86HKL9FoCQ",
            authDomain: "datuber-69e0c.firebaseapp.com",
            projectId: "datuber-69e0c",
            storageBucket: "datuber-69e0c.firebasestorage.app",
            messagingSenderId: "1056315084872",
            appId: "1:1056315084872:web:200d96d14241345bd7087d"
        };
        // -----------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Trocar Páginas
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            fecharMenus();
        }

        // Abrir/Fechar Menus
        function toggleMenu(id) {
            let m = document.getElementById(id);
            let estaAberto = m.style.display === 'block';
            fecharMenus();
            if(!estaAberto) m.style.display = 'block';
        }

        function fecharMenus() {
            document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        }

        // Login
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                document.getElementById('userImg').src = res.user.photoURL;
                alert("Logado como: " + res.user.displayName);
            });
        }

        // Mudar Foto
        function updateFoto(input) {
            const file = input.files[0];
            const ref = storage.ref('users/' + (auth.currentUser ? auth.currentUser.uid : 'anonimo') + '/foto.jpg');
            ref.put(file).then(() => {
                ref.getDownloadURL().then(url => {
                    document.getElementById('userImg').src = url;
                    alert("Foto atualizada!");
                });
            });
        }

        // Postar Vídeo ou Short
        function uploadMidia(input, pasta) {
            const file = input.files[0];
            const titulo = prompt("Dê um título:");
            const ref = storage.ref(pasta + '/' + Date.now() + "_" + file.name);
            
            alert("Enviando... Aguarde.");
            ref.put(file).then(snap => {
                snap.ref.getDownloadURL().then(url => {
                    db.collection(pasta).add({
                        url: url,
                        titulo: titulo,
                        autor: auth.currentUser ? auth.currentUser.displayName : 'Anônimo',
                        data: new Date()
                    });
                    alert("Postado com sucesso!");
                    carregarConteudo();
                });
            });
        }

        // Carregar do Banco de Dados
        function carregarConteudo() {
            // Carregar Vídeos
            db.collection("videos").orderBy("data", "desc").onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    let v = doc.data();
                    html += `<div class="video-card">
                        <video controls src="${v.url}"></video>
                        <h4>${v.titulo}</h4>
                        <p style="font-size:12px; color:#aaa">Postado por ${v.autor}</p>
                    </div>`;
                });
                document.getElementById('feedVideos').innerHTML = html || "Nenhum vídeo ainda.";
            });
        }

        carregarConteudo();
    </script>
</body>
</html>
